<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Brand mark: the header's red-square K, scalable so tabs/pinned
       icons render crisp where favicon.ico would blur. -->
  <rect width="64" height="64" fill="#ff1744"/>
  <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
        font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="44" font-weight="700" fill="#0a0a0c">K</text>
</svg>
